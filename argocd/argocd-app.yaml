---
# App 1 — Vote frontend (Deployment + Service)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vote-app
  namespace: voting
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/voting-app.git
    targetRevision: main
    path: k8s/vote
  destination:
    server: https://kubernetes.default.svc
    namespace: voting
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

