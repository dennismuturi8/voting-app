name: Build and Scan Result Service

on:
  push:
    branches: [ 'main' ]
    paths:
      - 'result/**'
      - '.github/workflows/build-result.yml'
  pull_request:
    branches: [ 'main' ]
    paths:
      - 'result/**'

env:
  APP_NAME: voting-app-result
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
  GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
  GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
  GIT_TOKEN: ${{ secrets.GIT_TOKEN }}

jobs:
  call-docker-build:
    name: Result Call Docker Build
    uses: dockersamples/.github/.github/workflows/reusable-docker-build.yaml@main
    permissions:
      contents: read
      packages: write
      pull-requests: write
      security-events: write # Required for Trivy report uploading
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      dockerhub-enable: true
      ghcr-enable: true
      image-names: |
        ghcr.io/${{ github.repository_owner }}/voting-app-result
        ${{ secrets.DOCKERHUB_USERNAME }}/voting-app-result
      tag-rules: |
        type=sha,format=long,prefix=sha-
        type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      context: result
      ### ADDING SCANNING PARAMETERS
      # Note: If the reusable template supports it, we enable it here:
      # scan-enable: true 
      # scan-severity: 'CRITICAL,HIGH'

  # We add a dedicated scan job if the reusable workflow doesn't block the push
  trivy-scan:
    needs: call-docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/voting-app-result:sha-${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  update-gitops:
    needs: [call-docker-build, trivy-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Update Image Tag
        run: |
           sed -i "s|image: ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:.*|image: ${{ env.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ github.sha }}|g" k8s/result-deployment.yaml

      - name: Commit and Push
        run: |
          git config --global user.name "GitOps Bot"
          git config --global user.email "actions@github.com"
          git add k8s/result-deployment.yaml
          git commit -m "chore(gitops): update result service to sha-${{ github.sha }} [skip ci]"
          git push